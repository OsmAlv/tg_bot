[phases.setup]
nixPkgs = [
  "python311",
  "glib",
  "nspr",
  "nss",
  "dbus",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "pango",
  "cairo",
  "alsa-lib",
  "cups",
  "libdrm",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libxshmfence",
  "xorg.libXi",
  "xorg.libXrender",
  "xorg.libXtst",
  "xorg.libxkbfile",
  "xorg.libXcursor",
  "xorg.libXinerama",
  "xorg.libXScrnSaver",
  "mesa"
]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libdbus-1-3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libatspi2.0-0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxext6",
  "libxshmfence1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "libexpat1",
  "libgtk-3-0"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright"

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright python -m playwright install --with-deps chromium"
]

[start]
cmd = "python -m bot.main"
