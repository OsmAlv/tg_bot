[phases.setup]
nixPkgs = ["python311"]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright"

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright python -m playwright install chromium"
]

[start]
cmd = "python -m bot.main"
